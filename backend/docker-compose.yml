services:
  # Laravel アプリケーション（PHP-FPM）
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meeting_room_app
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
    networks:
      - app-network

  # Webサーバー（nginx）
  nginx:
    image: nginx:alpine
    container_name: meeting_room_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

  # データベース（MySQL 8.4）
  mysql:
    image: mysql:8.4
    container_name: meeting_room_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: meeting_room_app
      MYSQL_ROOT_PASSWORD: "999999"
      MYSQL_USER: laravel
      MYSQL_PASSWORD: "999999"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network

volumes:
  mysql-data:

networks:
  app-network:
    driver: bridge
